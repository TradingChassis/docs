# site_name: CanonicalFlow | Trading System Documentation
site_name: CanonicalFlow
site_description: Trading System Documentation
site_author: bxvtr
copyright: >-
  Copyright © 2026 <a href="https://github.com/CanonicalFlow/" target="_blank" rel="noopener">CanonicalFlow</a>.
  Licensed under
  <a href="https://creativecommons.org/licenses/by/4.0/" target="_blank" rel="noopener">CC BY 4.0</a>.
  No financial advice.

docs_dir: docs

theme:
  name: material
  custom_dir: docs/overrides
  # Fallback only; header/drawer logos are overrides/partials/logo.html (light + dark)
  logo: assets/cf_logo_light.svg
  favicon: assets/cf_icon.ico
  language: en

  font:
    text: false
    code: false

  features:
    - navigation.top
    - navigation.tabs
    - navigation.instant
    - navigation.tracking
    - navigation.expand
    - navigation.sections
    - header.autohide
    - toc.follow
    - navigation.footer
    - navigation.indexes
    - navigation.path
    - toc.integrate
    - search.highlight

  palette:
    # Light (default)
    - scheme: default
      primary: white
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode

    # Dark
    - scheme: slate
      primary: black
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html

  - pymdownx.tabbed:
      alternate_style: true

  - pymdownx.snippets:
      base_path: docs

  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

plugins:
  - search
  - macros

extra:
  generator: false
  version:
    provider: mike

  social:
    - icon: fontawesome/brands/github
      link: https://github.com/CanonicalFlow/docs/

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/disable-nav-drag.js

