{#-
  Dual SVG logos: visibility is toggled in extra.css via [data-md-color-scheme].
  Paths use | url so builds work under mike version prefixes (/latest/, /0.1.0/, …).
-#}
<img class="cf-logo cf-logo--light" src="{{ 'assets/cf_logo_light.svg' | url }}" alt="{{ config.site_name | e }}" decoding="async" loading="eager">
<img class="cf-logo cf-logo--dark" src="{{ 'assets/cf_logo_dark.svg' | url }}" alt="{{ config.site_name | e }}" decoding="async" loading="eager">
